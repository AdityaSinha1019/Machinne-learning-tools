<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TF.js Reshaping & Training</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-vis"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.08); }
        .code-box { background: #1e1e1e; color: #d4d4d4; padding: 15px; border-radius: 6px; font-family: 'Consolas', monospace; white-space: pre-wrap; margin-top: 10px; }
        h2 { color: #0078d4; margin-top: 0; }
        .status { color: #e67e22; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>Tensor Reshaping Demo</h2>
    <div id="tensor-output" class="code-box">Processing tensors...</div>
    
    <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
    
    <h2>Model Training (y = x²)</h2>
    <p>Status: <span id="model-status" class="status">Initializing...</span></p>
</div>

<script src="script.js"></script>
</body>
</html>
