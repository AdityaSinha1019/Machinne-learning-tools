<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TF.js Linear Regression</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-vis"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; padding: 20px; }
        .wrapper { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { color: #1a73e8; margin-top: 0; }
        #status-bar { padding: 15px; background: #e8f0fe; border-radius: 8px; color: #1967d2; font-weight: 500; margin-bottom: 20px; }
        .instruction { color: #5f6368; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="wrapper">
    <h1>Linear Regression Analysis</h1>
    <div id="status-bar">Status: Initializing Synthetic Data...</div>
    <p class="instruction">The model is attempting to find the line of best fit for the scattered data points below. Open the <strong>tfjs-vis</strong> panel (usually on the right) to see the live regression plot.</p>
</div>

<script src="script.js"></script>
</body>
</html>
